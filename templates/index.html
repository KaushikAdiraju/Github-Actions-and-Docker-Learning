<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Web Search Agent</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>Web Search Agent</h2>
        </div>
        <div class="chat-box" id="chat-box">
            <div class="message ai-message">Hello! I am connected to the web. What would you like to search for today?</div>
        </div>
        <div class="input-area">
            <button id="mic-btn" title="Click to record">🎤</button>
            
            <input type="text" id="user-input" placeholder="Ask me anything..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
