name: CI Pipeline

# 1. Trigger the workflow on pushes or pull requests to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    # Use the official latest Ubuntu runner provided by GitHub
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code onto the runner
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up the Python environment
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.12'

    # Step 3: Install dependencies locally on the runner to check for environment compatibility
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Verify that the Docker image builds successfully
    - name: Build Docker Image
      run: |
        docker build -t websearch-chatbot:test .

    # Step 5: Log into your GCP VM securely using Google's official OS Login wrapper
    - name: Execute Remote Deployment via Google SSH
      run: |
        gcloud compute ssh kaushikadiraju3@${{ secrets.GCP_VM_IP }} \
          --zone="us-central1-a" \
          --quiet \
          --command="
            cd /home/kaushikadiraju3/app && \
            gcloud auth configure-docker us-central1-docker.pkg.dev --quiet && \
            docker compose pull && \
            docker compose up -d --remove-orphans
          "