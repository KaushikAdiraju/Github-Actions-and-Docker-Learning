name: CD Production Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        token_format: 'access_token'
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
        create_credentials_file: true # <- Dictates GitHub to save a persistent credentials file

    - name: Log into Google Artifact Registry
      run: |
        echo "${{ steps.auth.outputs.access_token }}" | docker login -u oauth2accesstoken --password-stdin https://us-central1-docker.pkg.dev

    - name: Build and Push Custom Chatbot Image
      env:
        REGISTRY_URL: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/chatbot-repo/websearch-chatbot:latest
      run: |
        docker build -t $REGISTRY_URL .
        docker push $REGISTRY_URL

    - name: Execute Remote Deployment via Google SSH
      env:
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        GCP_VM_IP: ${{ secrets.GCP_VM_IP }}
        CREDENTIALS_FILE: ${{ steps.auth.outputs.credentials_file_path }}
      run: |
        export GOOGLE_APPLICATION_CREDENTIALS="$CREDENTIALS_FILE"
        gcloud auth login --cred-file="$CREDENTIALS_FILE" --quiet
        gcloud config set project "$GCP_PROJECT_ID"

        # 1. Create the app directory and forcefully take ownership of it so we can write to it
        gcloud compute ssh kaushikadiraju3@instance-20260612-055827 \
          --zone="us-central1-c" \
          --tunnel-through-iap \
          --quiet \
          --project="$GCP_PROJECT_ID" \
          --command="sudo mkdir -p /home/kaushikadiraju3/app && sudo chown -R kaushikadiraju3 /home/kaushikadiraju3/app"

        # 2. Securely copy your docker-compose file from GitHub to the VM
        gcloud compute scp docker-compose.yml kaushikadiraju3@instance-20260612-055827:/home/kaushikadiraju3/app/docker-compose.yml \
          --zone="us-central1-c" \
          --tunnel-through-iap \
          --quiet \
          --project="$GCP_PROJECT_ID"

        # 3. Execute the deployment (using sudo to ensure Docker has execution rights)
        gcloud compute ssh kaushikadiraju3@instance-20260612-055827 \
          --zone="us-central1-c" \
          --tunnel-through-iap \
          --quiet \
          --project="$GCP_PROJECT_ID" \
          --command="
            cd /home/kaushikadiraju3/app && \
            sudo gcloud auth configure-docker us-central1-docker.pkg.dev --quiet && \
            sudo docker compose pull && \
            sudo docker compose up -d --remove-orphans
          "